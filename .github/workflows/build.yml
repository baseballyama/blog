name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# ref ごとに直列化する。PR は同一ブランチへの連続 push で古い run を打ち切り、
# main は途中キャンセルせず順番に流す。Pages への実デプロイの直列化は
# deploy ジョブ側の concurrency (group: pages) で行う。
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # 静的解析。JS/TS は oxlint、.svelte は rsvelte-lint (rsvelte コンパイラの
      # warning/a11y + eslint-plugin-svelte 互換ルール) が担当する。CI 用の
      # `lint:ci` は oxlint に --deny-warnings、rsvelte-lint に --max-warnings 0 を
      # 付けて warning も失敗扱いにする (ローカルの `pnpm lint` は開発体験のため
      # warning 非致命のまま)。
      - run: pnpm lint:ci

      # rsvelte-fmt によるフォーマット検査。.svelte はネイティブ整形し、それ以外は
      # oxfmt へ委譲する。差分があれば失敗する。
      - run: pnpm format:check

      # SvelteKit (rsvelte コンパイラ経由) でビルドし、build/ に静的出力する。
      # ビルド前に GitHub のスター数を再取得し、OGP 画像用の日本語フォントもダウンロードされる。
      - run: pnpm build
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - run: pnpm check

      # v4 以降はドットファイルが既定で成果物から除外されるため、static/.nojekyll を
      # 落とさないよう明示的に含める。
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/
          include-hidden-files: true

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
